name: Bug Report
description: A module is not working correctly.
title: "bug(community.<module>): "
labels: ["bug"]
body:
  - type: input
    id: module
    attributes:
      label: Module name
      placeholder: "e.g. community.postgis"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Module version
      placeholder: "e.g. 0.2.1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Load module ...
        2. Run query ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / stack trace
      render: shell
