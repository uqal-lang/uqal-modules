name: Validate PR

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, 'dev/**']

jobs:
  # ─── 1. Branch & Title Rules ────────────────────────────────────────────────
  branch-and-title:
    name: Branch & Title Rules
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          TARGET="${{ github.base_ref }}"

          if [[ "$TARGET" == "main" ]]; then
            if [[ ! "$BRANCH" =~ ^(dev/|hotfix/) ]]; then
              echo "❌ PRs to main must come from dev/* or hotfix/* branches."
              echo "   Got: $BRANCH"
              exit 1
            fi
          fi

          if [[ "$TARGET" =~ ^dev/ ]]; then
            if [[ ! "$BRANCH" =~ ^(feat/|fix/|refactor/|docs/|test/|chore/) ]]; then
              echo "❌ PRs to dev/* must come from feat/*, fix/*, refactor/*, docs/*, test/*, chore/*."
              echo "   Got: $BRANCH"
              exit 1
            fi
          fi

      - name: Check PR title follows Conventional Commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|breaking|refactor|docs|test|chore)\([a-z0-9._-]+\): .{3,}'
          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            echo "❌ PR title must follow Conventional Commits: type(scope): description"
            echo "   Valid types: feat, fix, breaking, refactor, docs, test, chore"
            echo "   Example:     feat(community.postgis): add ST_Within support"
            echo "   Got:         $PR_TITLE"
            exit 1
          fi

      - name: Check scope matches changed module
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        uses: actions/checkout@v4
        # This step needs the file list — checked in validate-module below

  # ─── 2. Module Structure ────────────────────────────────────────────────────
  validate-module:
    name: Module Structure & Docs
    runs-on: ubuntu-latest
    outputs:
      module: ${{ steps.detect.outputs.module }}
      module_path: ${{ steps.detect.outputs.module_path }}
      has_grammar: ${{ steps.detect.outputs.has_grammar }}
      module_type: ${{ steps.detect.outputs.module_type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed module
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          MODULE_DIRS=$(echo "$CHANGED" | grep '^modules/' | cut -d'/' -f1-2 | sort -u)
          COUNT=$(echo "$MODULE_DIRS" | grep -c 'modules/' 2>/dev/null || echo 0)

          if [[ "$COUNT" -gt 1 ]]; then
            echo "❌ Only one module directory may be changed per PR."
            echo "   Changed module directories:"
            echo "$MODULE_DIRS"
            exit 1
          fi

          MODULE=$(echo "$MODULE_DIRS" | head -1 | cut -d'/' -f2)
          MODULE_PATH="modules/$MODULE"

          echo "module=$MODULE" >> $GITHUB_OUTPUT
          echo "module_path=$MODULE_PATH" >> $GITHUB_OUTPUT

          HAS_GRAMMAR=$(test -f "$MODULE_PATH/grammar_extension.lark" && echo "true" || echo "false")
          echo "has_grammar=$HAS_GRAMMAR" >> $GITHUB_OUTPUT

      - name: Verify scope in PR title matches module
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          MODULE="${{ steps.detect.outputs.module }}"
          SCOPE=$(echo "$PR_TITLE" | grep -oP '(?<=\()[^)]+(?=\))')
          if [[ "$SCOPE" != "$MODULE" ]]; then
            echo "❌ PR title scope '$SCOPE' does not match changed module '$MODULE'."
            exit 1
          fi

      - name: Check module.json has all required fields
        run: |
          JSON="${{ steps.detect.outputs.module_path }}/module.json"

          if [[ ! -f "$JSON" ]]; then
            echo "❌ module.json not found at $JSON"
            exit 1
          fi

          for FIELD in name version compatible_with type description author repository; do
            VALUE=$(jq -r ".$FIELD // empty" "$JSON")
            if [[ -z "$VALUE" ]]; then
              echo "❌ module.json missing required field: $FIELD"
              exit 1
            fi
          done

          TYPE=$(jq -r '.type' "$JSON")
          if [[ "$TYPE" != "standalone" && "$TYPE" != "extension" ]]; then
            echo "❌ module.json 'type' must be 'standalone' or 'extension'. Got: $TYPE"
            exit 1
          fi
          echo "module_type=$TYPE" >> $GITHUB_OUTPUT

          if [[ "$TYPE" == "extension" ]]; then
            EXTENDS=$(jq -r '.extends // empty' "$JSON")
            if [[ -z "$EXTENDS" ]]; then
              echo "❌ Extension module must have 'extends' field in module.json."
              exit 1
            fi
          fi

      - name: Check interface version compatibility
        run: |
          JSON="${{ steps.detect.outputs.module_path }}/module.json"
          COMPATIBLE=$(jq -r '.compatible_with' "$JSON")
          INTERFACE_VERSION=1

          if [[ "$COMPATIBLE" != "$INTERFACE_VERSION" ]]; then
            echo "❌ module.json compatible_with=$COMPATIBLE but current INTERFACE_VERSION=$INTERFACE_VERSION"
            echo "   Update 'compatible_with' to $INTERFACE_VERSION to proceed."
            exit 1
          fi

      - name: Check docs structure (index.md + syntax.md + required sections)
        run: |
          MODULE_PATH="${{ steps.detect.outputs.module_path }}"

          for FILE in docs/index.md docs/syntax.md; do
            if [[ ! -f "$MODULE_PATH/$FILE" ]]; then
              echo "❌ Required documentation file missing: $MODULE_PATH/$FILE"
              exit 1
            fi
          done

          INDEX="$MODULE_PATH/docs/index.md"
          for SECTION in "## Overview" "## Prerequisites" "## Setup" "## Quick Example"; do
            if ! grep -q "^$SECTION" "$INDEX"; then
              echo "❌ docs/index.md missing required section: $SECTION"
              exit 1
            fi
          done

          SYNTAX="$MODULE_PATH/docs/syntax.md"
          if ! grep -q "^## " "$SYNTAX"; then
            echo "❌ docs/syntax.md has no feature sections (needs at least one ## heading)"
            exit 1
          fi

      - name: Check tests folder structure
        run: |
          MODULE_PATH="${{ steps.detect.outputs.module_path }}"
          TYPE=$(jq -r '.type' "$MODULE_PATH/module.json")
          HAS_GRAMMAR="${{ steps.detect.outputs.has_grammar }}"

          # Unit tests: always required
          UNIT_TESTS=$(ls "$MODULE_PATH/tests/unit/test_"*.py 2>/dev/null | wc -l)
          if [[ "$UNIT_TESTS" -eq 0 ]]; then
            echo "❌ Missing unit tests. Create at least one file in $MODULE_PATH/tests/unit/test_*.py"
            exit 1
          fi

          # Validator tests: required if native_validator.py exists
          if [[ -f "$MODULE_PATH/native_validator.py" ]]; then
            if [[ ! -f "$MODULE_PATH/tests/unit/test_validator.py" ]]; then
              echo "❌ native_validator.py exists but tests/unit/test_validator.py is missing"
              exit 1
            fi
          fi

          # Grammar tests: required if grammar_extension.lark exists
          if [[ "$HAS_GRAMMAR" == "true" ]]; then
            if [[ ! -f "$MODULE_PATH/tests/grammar/test_grammar.py" ]]; then
              echo "❌ grammar_extension.lark found but tests/grammar/test_grammar.py is missing"
              exit 1
            fi
          fi

          # Integration tests: optional
          # If docker-compose.test.yml exists, integration tests must also exist.
          # If neither exists, that is fine — mock-based unit tests are sufficient.
          if [[ -f "$MODULE_PATH/docker-compose.test.yml" ]]; then
            if [[ ! -f "$MODULE_PATH/tests/integration/test_integration.py" ]]; then
              echo "❌ docker-compose.test.yml found but tests/integration/test_integration.py is missing"
              exit 1
            fi
          fi

  # ─── 3. Tests & Coverage ────────────────────────────────────────────────────
  run-tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: validate-module
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install module dependencies
        working-directory: ${{ needs.validate-module.outputs.module_path }}
        run: uv sync

      - name: Start test database
        if: needs.validate-module.outputs.module_type == 'standalone'
        working-directory: ${{ needs.validate-module.outputs.module_path }}
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Run unit + grammar tests with coverage (translator ≥80%)
        working-directory: ${{ needs.validate-module.outputs.module_path }}
        run: |
          uv run pytest tests/unit/ tests/grammar/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Check native_validator coverage (≥90%)
        if: hashFiles(format('{0}/native_validator.py', needs.validate-module.outputs.module_path)) != ''
        working-directory: ${{ needs.validate-module.outputs.module_path }}
        run: |
          uv run pytest tests/unit/test_validator.py \
            --cov=native_validator \
            --cov-fail-under=90 \
            -v

      - name: Run integration tests
        if: needs.validate-module.outputs.module_type == 'standalone'
        working-directory: ${{ needs.validate-module.outputs.module_path }}
        run: uv run pytest tests/integration/ -v

      - name: Run UQAL compliance suite
        working-directory: ${{ needs.validate-module.outputs.module_path }}
        run: uv run pytest -m compliance -v

      - name: Stop test database
        if: always() && needs.validate-module.outputs.module_type == 'standalone'
        working-directory: ${{ needs.validate-module.outputs.module_path }}
        run: docker compose -f docker-compose.test.yml down
