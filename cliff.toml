[changelog]
header = ""
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# Turn (#123) at end of commit message into a clickable PR link
[[git.commit_preprocessors]]
pattern = '\(#(\d+)\)$'
replace = '([#$1](https://github.com/uqal/uqal-modules/pull/$1))'

# Group commits by type → changelog section
[[git.commit_parsers]]
message = "^breaking"
group = "Breaking Changes"

[[git.commit_parsers]]
message = "^feat"
group = "Added"

[[git.commit_parsers]]
message = "^fix"
group = "Fixed"

[[git.commit_parsers]]
message = "^refactor"
group = "Changed"

# Excluded from user-facing changelog
[[git.commit_parsers]]
message = "^(docs|test|chore|ci)"
skip = true
